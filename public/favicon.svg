<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    path { fill: #171717; }
    @media (prefers-color-scheme: dark) {
      path { fill: #fafafa; }
    }
  </style>
  <!-- Left column (full height I-beam) -->
  <rect x="3" y="3" width="3" height="18" rx="0.5" fill="#171717" />

  <!-- Top beam connecting columns -->
  <rect x="3" y="3" width="18" height="3" rx="0.5" fill="#171717" />

  <!-- Right column (shorter - under construction) -->
  <rect x="18" y="3" width="3" height="10" rx="0.5" fill="#171717" />

  <!-- Middle ascending bar (progress/tracking element) -->
  <rect x="10" y="9" width="2.5" height="12" rx="0.5" fill="#171717" />
</svg>
